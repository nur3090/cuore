<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Regalo Per Te</title>
    <style>
        /* Setup della pagina */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: none; /* Nasconde il cuore finché non si clicca */
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Stile del tasto d'inizio "PER TE" */
        #startBtn {
            position: relative;
            padding: 20px 50px;
            font-size: 28px;
            font-weight: bold;
            color: #ff3264;
            background: transparent;
            border: 3px solid #ff3264;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.4s ease-in-out;
            z-index: 10;
            box-shadow: 0 0 15px rgba(255, 50, 100, 0.2);
        }

        #startBtn:hover {
            background-color: #ff3264;
            color: #fff;
            box-shadow: 0 0 40px #ff3264;
            transform: scale(1.1);
        }

        /* Testo che appare sopra il cuore */
        #message {
            position: absolute;
            color: white;
            font-size: 35px;
            font-weight: bold;
            font-style: italic;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            z-index: 5;
        }
    </style>
</head>
<body>

    <button id="startBtn">Per Te</button>

    <audio id="bgMusic" loop>
        <source src="love.mp3" type="audio/mpeg">
        Il tuo browser non supporta l'audio.
    </audio>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('startBtn');
        const audio = document.getElementById('bgMusic');

        let particles = [];
        const phrases = ["non perdere la speranza", "non pesare che non vali", "SEI FORTE", "non tela prendere con testesso", "abbi fiducia in te", "si risolvera tutto"];
        let phraseIndex = 0;
        let textAlpha = 0;
        let textMode = 'fadeIn';
        let textTimer = 0;
        let animationRunning = false;

        // Adatta il canvas
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Equazione del cuore
        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 15, y: -y * 15 }; 
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.t = Math.random() * Math.PI * 2;
                const point = getHeartPoint(this.t);
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.targetX = canvas.width / 2 + point.x;
                this.targetY = canvas.height / 2 + point.y;
                this.speed = Math.random() * 0.02 + 0.01;
                this.size = Math.random() * 2 + 0.5;
                this.alpha = 0;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 50, 100, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                if (this.alpha < 1) this.alpha += 0.01;
                
                const dist = Math.sqrt(Math.pow(this.targetX - this.x, 2) + Math.pow(this.targetY - this.y, 2));
                if (dist < 1) this.reset();
            }
        }

        // Inizializza particelle
        for (let i = 0; i < 600; i++) {
            particles.push(new Particle());
        }

        function drawText() {
            ctx.fillStyle = `rgba(255, 255, 255, ${textAlpha})`;
            ctx.font = "bold 38px Arial";
            ctx.textAlign = "center";
            ctx.fillText(phrases[phraseIndex], canvas.width / 2, canvas.height / 2 + 10);

            if (textMode === 'fadeIn') {
                textAlpha += 0.008;
                if (textAlpha >= 1) {
                    textAlpha = 1;
                    textTimer++;
                    if (textTimer > 120) { textMode = 'fadeOut'; textTimer = 0; }
                }
            } else {
                textAlpha -= 0.008;
                if (textAlpha <= 0) {
                    textAlpha = 0;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                    textMode = 'fadeIn';
                }
            }
        }

        function animate() {
            if (!animationRunning) return;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            drawText();
            requestAnimationFrame(animate);
        }

        // Evento di avvio
        btn.addEventListener('click', () => {
            btn.style.display = 'none'; // Nasconde il tasto
            canvas.style.display = 'block'; // Mostra il cuore
            audio.play(); // Avvia musica
            animationRunning = true;
            animate(); // Parte l'animazione
        });

        // Ridimensionamento finestra
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Reset particelle per centrarle
            particles.forEach(p => p.reset());
        });
    </script>
</body>
</html>
